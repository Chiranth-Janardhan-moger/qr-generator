<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>QR Generator</h1>
            <p>Create beautiful QR codes instantly</p>
        </header>
        
        <main>
            <div class="input-group">
                <input type="text" id="url" placeholder="Enter URL or text here..." autocomplete="off">
                <div class="focus-border"></div>
            </div>
            
            <button id="generateBtn" onclick="generateQR()">
                <span>Generate QR Code</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
            
            <div class="qr-container" id="qrWrapper" style="display: none;">
                <div class="qr-box" id="qrcode"></div>
                <button class="download-btn" onclick="downloadQR()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download PNG
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
