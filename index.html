<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern QR Code Generator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- qr-code-styling library via CDN -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>
    <!-- Floating background blobs -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <!-- Main workspace container -->
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>QR Generator <span class="badge">Pro</span></h1>
            <p>Design, customize, and export high-quality QR codes in seconds</p>
        </header>
        
        <div class="dashboard-grid">
            <!-- Left panel: Controls -->
            <aside class="controls-panel">
                <!-- Section 1: Content Input -->
                <div class="card card-input">
                    <h2 class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
                        1. Enter Content
                    </h2>
                    <div class="input-group">
                        <input type="text" id="url" placeholder="Enter URL or text to encode..." autocomplete="off" value="https://github.com">
                        <div class="focus-border"></div>
                    </div>
                </div>

                <!-- Customization Accordion -->
                <div class="accordion">
                    <!-- Accordion 1: Shapes & Patterns -->
                    <div class="accordion-item active">
                        <button class="accordion-trigger">
                            <span class="trigger-label">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                                Shapes & Patterns
                            </span>
                            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </button>
                        <div class="accordion-content">
                            <div class="form-group">
                                <label>Data Pattern</label>
                                <div class="option-grid" id="dotTypeGrid">
                                    <button class="option-btn active" data-value="square">Square</button>
                                    <button class="option-btn" data-value="dots">Dots</button>
                                    <button class="option-btn" data-value="rounded">Rounded</button>
                                    <button class="option-btn" data-value="extra-rounded">Extra Rounded</button>
                                    <button class="option-btn" data-value="classy">Classy</button>
                                    <button class="option-btn" data-value="classy-rounded">Classy Rounded</button>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Corner Square Shape (Outer)</label>
                                <div class="option-grid" id="cornerSquareTypeGrid">
                                    <button class="option-btn active" data-value="square">Square</button>
                                    <button class="option-btn" data-value="dot">Dot</button>
                                    <button class="option-btn" data-value="extra-rounded">Rounded</button>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Corner Dot Shape (Inner)</label>
                                <div class="option-grid" id="cornerDotTypeGrid">
                                    <button class="option-btn active" data-value="square">Square</button>
                                    <button class="option-btn" data-value="dot">Dot</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Accordion 2: Color Palette -->
                    <div class="accordion-item">
                        <button class="accordion-trigger">
                            <span class="trigger-label">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/><path d="M7.5 10.5C8.32843 10.5 9 9.82843 9 9C9 8.17157 8.32843 7.5 7.5 7.5C6.67157 7.5 6 8.17157 6 9C6 9.82843 6.67157 10.5 7.5 10.5Z"/><path d="M11.5 7.5C12.3284 7.5 13 6.82843 13 6C13 5.17157 12.3284 4.5 11.5 4.5C10.6716 4.5 10 5.17157 10 6C10 6.82843 10.6716 7.5 11.5 7.5Z"/><path d="M16.5 10.5C17.3284 10.5 18 9.82843 18 9C18 8.17157 17.3284 7.5 16.5 7.5C15.6716 7.5 15 8.17157 15 9C15 9.82843 15.6716 10.5 16.5 10.5Z"/><path d="M6 14C6 14 8 17 12 17C16 17 18 14 18 14" stroke-linecap="round"/></svg>
                                Color Customization
                            </span>
                            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </button>
                        <div class="accordion-content">
                            <!-- Preset Palettes -->
                            <div class="form-group">
                                <label>Quick Preset Palettes</label>
                                <div class="palette-grid">
                                    <button class="palette-btn" data-dots="#6366f1" data-bg="#ffffff" style="background: linear-gradient(135deg, #6366f1 50%, #ffffff 50%);" title="Indigo Light"></button>
                                    <button class="palette-btn" data-dots="#10b981" data-bg="#0f172a" style="background: linear-gradient(135deg, #10b981 50%, #0f172a 50%);" title="Emerald Cyber"></button>
                                    <button class="palette-btn" data-dots="#ec4899" data-bg="#ffffff" style="background: linear-gradient(135deg, #ec4899 50%, #ffffff 50%);" title="Hot Pink"></button>
                                    <button class="palette-btn" data-dots="#f59e0b" data-bg="#1e1b4b" style="background: linear-gradient(135deg, #f59e0b 50%, #1e1b4b 50%);" title="Sunset Gold"></button>
                                    <button class="palette-btn" data-dots="#000000" data-bg="#ffffff" style="background: linear-gradient(135deg, #000000 50%, #ffffff 50%);" title="Monochrome Classic"></button>
                                    <button class="palette-btn" data-dots="#ef4444" data-bg="#ffffff" style="background: linear-gradient(135deg, #ef4444 50%, #ffffff 50%);" title="Crimson"></button>
                                </div>
                            </div>

                            <!-- Color Pickers -->
                            <div class="color-picker-group">
                                <div class="color-picker-item">
                                    <label for="dotsColor">Dots Color</label>
                                    <div class="color-input-wrapper">
                                        <input type="color" id="dotsColor" value="#6366f1">
                                        <span class="color-value">#6366f1</span>
                                    </div>
                                </div>
                                <div class="color-picker-item">
                                    <label for="bgColor">Background Color</label>
                                    <div class="color-input-wrapper">
                                        <input type="color" id="bgColor" value="#ffffff">
                                        <span class="color-value">#ffffff</span>
                                    </div>
                                </div>
                            </div>

                            <div class="checkbox-group">
                                <input type="checkbox" id="transparentBg">
                                <label for="transparentBg">Transparent Background</label>
                            </div>

                            <!-- Custom Corner Colors -->
                            <div class="divider"></div>
                            
                            <div class="checkbox-group">
                                <input type="checkbox" id="customCornerColors" checked>
                                <label for="customCornerColors">Match corner colors with data dots</label>
                            </div>

                            <div class="color-picker-group nested-controls" id="cornerColorsPanel" style="display: none;">
                                <div class="color-picker-item">
                                    <label for="cornerSquareColor">Corner Frame Color</label>
                                    <div class="color-input-wrapper">
                                        <input type="color" id="cornerSquareColor" value="#6366f1">
                                        <span class="color-value">#6366f1</span>
                                    </div>
                                </div>
                                <div class="color-picker-item">
                                    <label for="cornerDotColor">Corner Dot Color</label>
                                    <div class="color-input-wrapper">
                                        <input type="color" id="cornerDotColor" value="#6366f1">
                                        <span class="color-value">#6366f1</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Accordion 3: Logo & Branding -->
                    <div class="accordion-item">
                        <button class="accordion-trigger">
                            <span class="trigger-label">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                                Logo & Branding
                            </span>
                            <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                        </button>
                        <div class="accordion-content">
                            <!-- Preset Logos -->
                            <div class="form-group">
                                <label>Preset Brand Logos</label>
                                <div class="logo-preset-grid">
                                    <button class="logo-btn active" data-logo="none">None</button>
                                    <button class="logo-btn" data-logo="github">GitHub</button>
                                    <button class="logo-btn" data-logo="google">Google</button>
                                    <button class="logo-btn" data-logo="twitter">X/Twitter</button>
                                    <button class="logo-btn" data-logo="linkedin">LinkedIn</button>
                                    <button class="logo-btn" data-logo="instagram">Instagram</button>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <!-- Custom Upload -->
                            <div class="form-group">
                                <label>Upload Custom Logo</label>
                                <div class="upload-area" id="dropZone">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                    <p>Drag & drop image here or <span>browse</span></p>
                                    <input type="file" id="logoUpload" accept="image/*" style="display: none;">
                                </div>
                                <div class="logo-preview-wrapper" id="logoPreviewContainer" style="display: none;">
                                    <img id="logoPreview" src="" alt="Logo Preview">
                                    <span id="logoFileName">logo.png</span>
                                    <button id="removeLogoBtn" title="Remove Logo">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </div>
                            </div>

                            <!-- Size slider -->
                            <div class="form-group nested-controls" id="logoSizeGroup" style="display: none;">
                                <div class="slider-header">
                                    <label for="logoSize">Logo Size Scaling</label>
                                    <span id="logoSizeVal">30%</span>
                                </div>
                                <input type="range" id="logoSize" min="0.15" max="0.45" step="0.05" value="0.3">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
            
            <!-- Right panel: Interactive Preview -->
            <section class="preview-panel">
                <div class="card card-preview">
                    <h2 class="section-title">Live Preview</h2>
                    
                    <div class="qr-preview-container">
                        <div class="qr-box" id="qrcode">
                            <!-- Rendered by qr-code-styling -->
                        </div>
                    </div>

                    <div class="export-settings">
                        <div class="form-group-row">
                            <div class="input-half">
                                <label for="fileName">Filename</label>
                                <input type="text" id="fileName" value="qrcode" placeholder="File name">
                            </div>
                            <div class="input-half">
                                <label for="exportFormat">Format</label>
                                <select id="exportFormat">
                                    <option value="png">PNG</option>
                                    <option value="svg">SVG</option>
                                    <option value="jpeg">JPEG</option>
                                </select>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button id="downloadBtn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                                Export QR Code
                            </button>
                            <button id="copyBtn" class="btn-secondary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                Copy Image
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast Notification container -->
    <div id="toast" class="toast-notification">Copied to clipboard!</div>

    <script src="script.js"></script>
</body>
</html>
